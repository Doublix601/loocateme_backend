services:
  api:
    build: .
    container_name: loocateme-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - DOCKER_CONTAINER=true
      - PORT=4000
      - NODE_ENV=development
      - CORS_ORIGIN=http://localhost:19006,http://localhost:3000,http://pro.loocate.me,${BUSINESS_SITE_PUBLIC_URL:-https://pro.loocate.me}
      - MONGODB_URI=mongodb://appuser:${MONGO_APP_PASSWORD:-change-me-app}@mongo:27017/loocateme
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET must be set in .env}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET must be set in .env}
      - JWT_ACCESS_EXPIRES=15m
      - JWT_REFRESH_EXPIRES=30d
      - REDIS_URL=redis://default:${REDIS_PASSWORD:-change-me-redis}@redis:6379
      - UPLOAD_DIR=uploads
      # Public URL de l'API utilisée dans les liens envoyés par email
      - API_PUBLIC_URL=${API_PUBLIC_URL:-http://localhost:4000}
      - BASE_URL=${API_PUBLIC_URL:-http://localhost:4000}
      - APP_PUBLIC_URL=http://54.38.34.4:4000
      - SMTP_HOST=pro3.mail.ovh.net
      - SMTP_PORT=587
      - SMTP_SECURE=false
      - SMTP_USER=no-reply@loocate.me
      - SMTP_PASS=${SMTP_PASS:?SMTP_PASS must be set in .env}
      # OVH supporte AUTH LOGIN et AUTH PLAIN. Par défaut, on force LOGIN pour éviter les erreurs 535.
      - SMTP_AUTH_METHOD=LOGIN
      - MAIL_FROM="LoocateMe <no-reply@loocate.me>"
      - SMTP_DEBUG=false
      - EMAIL_TEST_SECRET=change-me-test
      - EMAIL_VERIF_TOKEN_TTL=24h
      - PWD_RESET_TOKEN_TTL=1h
      - BUSINESS_SITE_PUBLIC_URL=${BUSINESS_SITE_PUBLIC_URL:-https://pro.loocate.me}
      - BUSINESS_ACTIVATION_TOKEN_TTL=7d
      - BUSINESS_DOCS_DIR=data/business-docs
      - MONGO_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:-change-me-root}
      - MONGO_APP_PASSWORD=${MONGO_APP_PASSWORD:-change-me-app}
    volumes:
      - ./:/app
      - ./data/uploads:/app/uploads
    depends_on:
      - mongo
      - redis
    command: sh -c "if [ -f package-lock.json ]; then npm ci || npm install; else npm install; fi && npm run dev"
  nginx:
    image: nginx:alpine
    container_name: loocateme-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - api
    networks:
      - default
      - loocateme_shared
  mongo:
    image: mongo:6
    container_name: loocateme-mongo
    restart: unless-stopped
    # Expose Mongo ONLY to localhost so local 'npm run dev' can connect
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:-change-me-root}
      - MONGO_INITDB_DATABASE=loocateme
      - MONGO_APP_PASSWORD=${MONGO_APP_PASSWORD:-change-me-app}
    volumes:
      - mongo_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
      - ./scripts/mongo-entrypoint.sh:/docker-entrypoint-initdb.d/mongo-entrypoint.sh:ro
    command: ["bash", "/docker-entrypoint-initdb.d/mongo-entrypoint.sh"]
  redis:
    image: redis:7-alpine
    container_name: loocateme-redis
    restart: unless-stopped
    # Expose Redis ONLY to localhost so local 'npm run dev' can connect
    ports:
      - "127.0.0.1:6379:6379"
    # Do NOT expose Redis to the Internet
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-change-me-redis}"]
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:

networks:
  default:
  loocateme_shared:
    external: true
