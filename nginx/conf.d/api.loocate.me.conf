# NGINX reverse proxy for api.loocate.me -> Node API (loocateme-api:4000)

# Port 80 kept serving plain HTTP (not redirected) because the mobile app
# (loocateme-app/components/ServerUtils.js) still defaults to http://api.loocate.me.
# The 443 block below unblocks the HTTPS website, which browsers otherwise
# mixed-content-block from calling an http:// API.
server {
  listen 80;
  server_name api.loocate.me;

  # Défaut nginx (1m) trop bas pour les uploads (vidéos business brutes jusqu'à
  # 50 Mo côté multer avant compression serveur, cf. storage.service.js) : sans ça
  # nginx renvoie un 413 brut avant même que la requête n'atteigne Express, ce que
  # le navigateur affiche à tort comme une erreur CORS (pas de header CORS sur la page 413).
  client_max_body_size 60m;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Basic security headers
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer" always;

  # Compresse les réponses JSON de l'API (le proxy vers Node ne compressait
  # rien avant) ; les types déjà compressés (images/vidéos servies plus bas)
  # ne sont pas dans gzip_types donc ne sont jamais re-compressés inutilement.
  gzip on;
  gzip_types application/json text/plain;
  gzip_min_length 512;
  gzip_proxied any;

  # Sert les fichiers uploadés (profils, bannières, médias business) directement
  # depuis nginx au lieu de faire transiter chaque requête par le process Node,
  # avec un cache navigateur long (les noms de fichiers sont uniques/versionnés
  # côté upload, donc un cache long-lived est sûr).
  location /uploads/ {
    alias /var/www/uploads/;
    expires 30d;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  location / {
    proxy_pass http://loocateme-api:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}

server {
  listen 443 ssl;
  server_name api.loocate.me;

  ssl_certificate /etc/letsencrypt/live/api.loocate.me/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.loocate.me/privkey.pem;

  client_max_body_size 60m;

  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer" always;

  gzip on;
  gzip_types application/json text/plain;
  gzip_min_length 512;
  gzip_proxied any;

  location /uploads/ {
    alias /var/www/uploads/;
    expires 30d;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  location / {
    proxy_pass http://loocateme-api:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
