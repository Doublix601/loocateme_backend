# NGINX reverse proxy for loocate.me (public/consumer site) -> Next.js (loocateme-public-website:3000)
#
# Starts HTTP-only: certbot needs the domain's DNS to actually point here
# before the ACME HTTP-01 challenge can succeed. Once DNS is switched and
# propagated, request a cert (see api.loocate.me.conf / pro.loocate.me.conf
# for the HTTPS server block pattern) and add the 443 block + redirect.

server {
  listen 80;
  server_name loocate.me www.loocate.me;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    proxy_pass http://loocateme-public-website:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
